name: Delegation Bot (dry-run)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # runs daily at 08:00 UTC
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install python-frontmatter
      - run: python scripts/delegation_bot.py
