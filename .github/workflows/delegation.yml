name: Delegation Bot

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create issues (true) or just dry-run (false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC

concurrency:
  group: delegation-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      # (projects permission in Actions is for "Projects classic"; we use a PAT for Projects v2)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-frontmatter requests

      - name: Run bot
        env:
          APPLY: ${{ github.event.inputs.apply }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}           # Issues API
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}         # PAT with repo+project scopes
          REPO: ${{ github.repository }}                      # owner/repo
          PROJECT_LOGIN: ammar-uni                            # owner of the Project (user or org)
          PROJECT_TITLE: Delegation Bot - PoC                 # EXACT project title
          PYTHONUNBUFFERED: "1"
        run: |
          echo "ENV project login/title: $PROJECT_LOGIN / $PROJECT_TITLE"
          python scripts/delegation_bot.py | tee bot.log
          echo "### Delegation Bot summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 300 bot.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
