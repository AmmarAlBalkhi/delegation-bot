name: Delegation Bot

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create issues (true) or just dry-run (false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC

concurrency:
  group: delegation-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install python-frontmatter requests
      - name: Run bot
        env:
          APPLY: ${{ github.event.inputs.apply }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PROJECT_LOGIN: ammar-uni
          PROJECT_TITLE: Delegation Bot - PoC
        run: |
          python scripts/delegation_bot.py | tee bot.log
          echo "### Delegation Bot summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 bot.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
