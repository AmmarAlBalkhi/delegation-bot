name: Delegation Bot

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create/update issues (true) or dry-run (false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"  # optional

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify files are present
        run: |
          pwd
          ls -la
          ls -la scripts || true
          ls -la tasks   || true
          test -f scripts/delegation_bot.py || (echo "ERROR: scripts/delegation_bot.py not found" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter requests

      - name: Run delegation bot
        env:
          APPLY: ${{ github.event.inputs.apply || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}   # optional
          REPO: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/delegation_bot.py | tee bot.log

      - name: Add run summary
        if: always()
        run: |
          {
            echo "### Delegation Bot summary"
            echo
            echo '```'
            tail -n 300 bot.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
