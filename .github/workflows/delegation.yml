name: Delegation Bot

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create/update issues (true) or dry-run (false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"   # optional: daily at 08:00 UTC

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "pwd: $(pwd)"
          echo "::group::TREE"
          ls -la
          echo
          [ -d scripts ] && (echo "scripts/"; ls -la scripts)
          [ -d tasks ] && (echo "tasks/"; ls -la tasks)
          echo "::endgroup::TREE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (frontmatter + requests)
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter requests

      - name: Locate and run delegation bot
        env:
          APPLY: ${{ github.event.inputs.apply || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}   # optional
          REPO: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          set -euo pipefail

          # Pick the script path automatically (root or scripts/)
          if   [ -f scripts/delegation_bot.py ]; then SCRIPT="scripts/delegation_bot.py"
          elif [ -f delegation_bot.py ];        then SCRIPT="delegation_bot.py"
          else
            echo "ERROR: delegation_bot.py not found in repo root or scripts/."
            echo "Files at repo root:"; ls -la
            exit 1
          fi
          echo "Using script: $SCRIPT"

          # Make sure tasks folder exists; if not, show what we have
          if [ ! -d tasks ]; then
            echo "WARNING: 'tasks/' folder not found. Showing top-level Markdown for debugging:"
            ls -la | grep '\.md$' || true
          fi

          python "$SCRIPT" | tee bot.log

      - name: Add run summary
        if: always()
        run: |
          {
            echo "### Delegation Bot summary"
            echo
            echo '```'
            tail -n 300 bot.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
