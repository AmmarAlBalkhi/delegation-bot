name: Delegation Bot

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create/update issues (true) or dry-run (false)"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"  # daily 08:00 UTC; adjust or remove if you prefer manual runs only

concurrency:
  group: delegation-bot
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter requests

      - name: Run delegation bot
        env:
          APPLY: ${{ github.event.inputs.apply || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}   # optional (Projects V2)
          REPO: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          python scripts/delegation_bot.py | tee bot.log

      - name: Add run summary
        if: always()
        run: |
          {
            echo "### Delegation Bot summary"
            echo
            echo '```'
            tail -n 300 bot.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
